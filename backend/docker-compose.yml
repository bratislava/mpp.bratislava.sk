version: '3.8'
services:
  app:
    depends_on:
      - postgres
    build:
      context: .
      target: dev
    init: true
    env_file:
      - .env
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mpp?schema=public&connect_timeout=3
      DEBUG_HOST: 0.0.0.0:9229
    command: npm run start:dbpush:debug
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:9229:9229"
    volumes:
      - ./:/home/node/app

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mpp
      PGPORT: 5432
    expose:
      - '5432'
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
