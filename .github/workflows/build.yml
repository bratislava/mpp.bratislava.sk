name: Build
# Runs on every PR against master: dockerized validation, tests, lint and
# format for both services, plus a no-push build of the frontend image. The
# same reusable workflows run in deploy mode (cluster set) from deploy.yml.
on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-backend:
    name: Backend Build
    uses: ./.github/workflows/build-backend.yml
    secrets: inherit
    with:
      directory: backend/
      image: harbor.bratislava.sk/mpp/backend
      target_unit_test: test
      target_lint: lint
      target_e2e_test: e2e

  build-frontend:
    name: Frontend Build
    uses: ./.github/workflows/build-frontend.yml
    secrets: inherit
    with:
      directory: frontend/
      image: harbor.bratislava.sk/mpp/frontend
      build_env: staging
