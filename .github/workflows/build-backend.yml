name: Build Backend
# Two modes, selected by the `cluster` input:
#   - CI (cluster == ''): build the validation/test/lint[/e2e] images, do not
#     push.
#   - Deploy (cluster != ''): run the unit tests, then reuse an existing
#     commit image or build+push the `prod` image and re-tag it for the
#     cluster. The infrastructure deploy is triggered separately by the
#     caller (deploy.yml).
#
# Unit tests always run; lint and e2e run only when their target input is set
# (deploy.yml leaves them empty).
#
# Backend images are environment-agnostic, so the commit image (no flavor
# suffix) is reused across clusters.
on:
  workflow_call:
    inputs:
      directory:
        description: "Base dir where the service is located."
        type: string
        required: true
      image:
        description: "Full image name including registry/repository."
        type: string
        required: true
      target_unit_test:
        description: "Docker target used for unit test image build."
        type: string
        required: true
      target_lint:
        description: "Docker target used for the type-check + lint + format image build. Empty to skip."
        type: string
        required: false
        default: ""
      target_e2e_test:
        description: "Docker target used for E2E test image build. Empty to skip."
        type: string
        required: false
        default: ""
      cluster:
        description: >-
          Target cluster (development, staging, production). Empty = CI build
          only (no push). When set, the deployable image is built/pushed and
          re-tagged for the cluster, ready for the caller to trigger the
          infrastructure deploy.
        type: string
        required: false
        default: ""
    secrets:
      DOCKER_REGISTRY_USERNAME:
        required: true
      DOCKER_REGISTRY_PASSWORD:
        required: true
      HARBOR_REGISTRY_PASSWORD:
        required: true

permissions:
  contents: read

env:
  REGISTRY: harbor.bratislava.sk
  REGISTRY_USERNAME: robot$github_actions

jobs:
  test:
    name: Build Backend
    runs-on: bratislava
    env:
      # Per-cluster deploy tag prefix (empty in CI).
      CLUSTER_PREFIX: ${{ inputs.cluster != '' && format('{0}-', inputs.cluster) || '' }}
    services:
      postgres:
        # GitHub Actions does not support `if:` on services, so use an empty image
        # to disable the service when E2E tests are not running.
        image: ${{ inputs.target_e2e_test != '' && 'postgres:18-alpine' || '' }}
        env:
          POSTGRES_DB: mpp
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Resolve short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker build
        uses: bratislava/github-actions/.github/actions/setup-docker-build@beta
        with:
          docker_registry_username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          docker_registry_password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
          harbor_registry: ${{ env.REGISTRY }}
          harbor_registry_username: ${{ env.REGISTRY_USERNAME }}
          harbor_registry_password: ${{ secrets.HARBOR_REGISTRY_PASSWORD }}
          buildx_driver_opts: |
            network=host

      # One metadata call per build stage: the flavor suffix keeps each
      # stage's registry cache separate. The deployable image has no suffix, so
      # its cache is shared across clusters.
      - name: Docker metadata (test)
        id: meta-test
        uses: bratislava/github-actions/.github/actions/docker-metadata@beta
        with:
          image: ${{ inputs.image }}
          suffix: -test

      - name: Docker metadata (lint)
        if: ${{ inputs.target_lint != '' }}
        id: meta-lint
        uses: bratislava/github-actions/.github/actions/docker-metadata@beta
        with:
          image: ${{ inputs.image }}
          suffix: -lint

      - name: Docker metadata (e2e)
        if: ${{ inputs.target_e2e_test != '' }}
        id: meta-e2e
        uses: bratislava/github-actions/.github/actions/docker-metadata@beta
        with:
          image: ${{ inputs.image }}
          suffix: -e2e

      # Deploy mode only: tags and cache for the deployable image.
      - name: Docker metadata (deploy)
        if: ${{ inputs.cluster != '' }}
        id: meta-deploy
        uses: bratislava/github-actions/.github/actions/docker-metadata@beta
        with:
          image: ${{ inputs.image }}
          prefix: ${{ env.CLUSTER_PREFIX }}

      - name: Run unit tests
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.directory }}
          target: ${{ inputs.target_unit_test }}
          cache-from: ${{ steps.meta-test.outputs.cache_from }}
          cache-to: ${{ steps.meta-test.outputs.cache_to }}

      - name: Run type-check + ESLint + Prettier check
        if: ${{ inputs.target_lint != '' }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.directory }}
          target: ${{ inputs.target_lint }}
          cache-from: ${{ steps.meta-lint.outputs.cache_from }}
          cache-to: ${{ steps.meta-lint.outputs.cache_to }}

      - name: Run E2E tests
        if: ${{ inputs.target_e2e_test != '' }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.directory }}
          target: ${{ inputs.target_e2e_test }}
          cache-from: ${{ steps.meta-e2e.outputs.cache_from }}
          cache-to: ${{ steps.meta-e2e.outputs.cache_to }}
          build-args: |
            CI_E2E_DATABASE_URL=postgresql://postgres:postgres@localhost:${{ job.services.postgres.ports[5432] }}/mpp?schema=public&connect_timeout=30

      # Deploy mode only: reuse the commit image across clusters. If it already
      # exists, re-tag it for this cluster and skip the build below.
      - name: Check for existing image
        if: ${{ inputs.cluster != '' }}
        id: existing
        uses: bratislava/github-actions/.github/actions/check-existing-image@beta
        with:
          existing_tag: ${{ inputs.image }}:${{ steps.sha.outputs.short_sha }}
          new_tag: ${{ inputs.image }}:${{ env.CLUSTER_PREFIX }}${{ steps.sha.outputs.short_sha }}

      # Deploy mode: build+push the deployable (prod) image when not reused.
      - name: Build deploy image
        if: ${{ inputs.cluster != '' && steps.existing.outputs.found != 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.directory }}
          target: prod
          push: true
          tags: ${{ steps.meta-deploy.outputs.tags }}
          cache-from: ${{ steps.meta-deploy.outputs.cache_from }}
          cache-to: ${{ steps.meta-deploy.outputs.cache_to }}
